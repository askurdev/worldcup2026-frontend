<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>You're offline — World Cup 2026 Dashboard</title>
  <style>
    :root {
      --background: #0a0e12;
      --foreground: #f0ede4;
      --foreground-dim: #b9b5a9;
      --gold: #d4af37;
    }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: var(--background);
      color: var(--foreground);
      font-family: Inter, -apple-system, BlinkMacSystemFont, sans-serif;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
      text-align: center;
    }
    .icon {
      width: 56px;
      height: 56px;
      margin: 0 auto 20px;
      opacity: 0.6;
    }
    h1 {
      font-size: 22px;
      font-weight: 700;
      margin-bottom: 8px;
    }
    p {
      color: var(--foreground-dim);
      font-size: 14px;
      max-width: 360px;
      margin: 0 auto 24px;
      line-height: 1.5;
    }
    button {
      background: var(--gold);
      color: #0a0e12;
      border: none;
      border-radius: 8px;
      padding: 10px 20px;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
    }
    button:hover { opacity: 0.9; }
  </style>
</head>
<body>
  <div>
    <svg class="icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
      <path d="M1 9a16 16 0 0 1 22 0M5 13a10 10 0 0 1 14 0M9 17a4 4 0 0 1 6 0" stroke-dasharray="2 2"/>
      <line x1="2" y1="2" x2="22" y2="22"/>
    </svg>
    <h1>You're offline</h1>
    <p>
      This page hasn't been saved for offline viewing yet. Reconnect to the
      internet and try again — pages you've already visited will keep working
      offline.
    </p>
    <button onclick="window.location.reload()">Try again</button>
  </div>
</body>
</html>
